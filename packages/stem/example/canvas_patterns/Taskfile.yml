version: "3"

tasks:
  build:
    desc: No build required for canvas pattern demos.
    cmds:
      - echo "No build step required."

  _run-demo:
    internal: true
    cmds:
      - |
        bash -lc '
          set -euo pipefail
          root="{{.TASKFILE_DIR}}"
          stem_root="$root/../.."
          env_file="${ENV_FILE:-.env}"
          if [[ -f "$root/$env_file" ]]; then
            set -a
            source "$root/$env_file"
            set +a
          elif [[ -f "$env_file" ]]; then
            set -a
            source "$env_file"
            set +a
          fi
          cd "$stem_root"
          dart run "{{.DEMO_FILE}}"
        '

  run-chain:
    desc: Run chain canvas demo.
    cmds:
      - task: _run-demo
        vars:
          DEMO_FILE: example/canvas_patterns/chain_example.dart

  run-chord:
    desc: Run chord canvas demo.
    cmds:
      - task: _run-demo
        vars:
          DEMO_FILE: example/canvas_patterns/chord_example.dart

  run-group:
    desc: Run group canvas demo.
    cmds:
      - task: _run-demo
        vars:
          DEMO_FILE: example/canvas_patterns/group_example.dart

  run:
    desc: Run chain demo.
    cmds:
      - task: run-chain

  clean:
    desc: No artifacts to clean.
    cmds:
      - echo "No build artifacts to clean."
