version: "3"

tasks:
  keys:rotate:
    desc: Rotate primary/rotated HMAC keys across all local env profiles.
    cmds:
      - |
        bash -lc '
          set -euo pipefail
          root="{{.TASKFILE_DIR}}"
          files=("$root/.env" "$root/.env.primary" "$root/.env.rotate")
          for file in "${files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing $file"
              exit 1
            fi
          done

          primary="$(openssl rand -base64 32)"
          rotated="$(openssl rand -base64 32)"
          keys_value="primary:${primary},rotated:${rotated}"
          escaped_keys="$(printf "%s" "$keys_value" | sed -e "s/[&|]/\\\\&/g")"

          for file in "${files[@]}"; do
            if grep -q "^STEM_SIGNING_KEYS=" "$file"; then
              sed -i -E "s|^STEM_SIGNING_KEYS=.*|STEM_SIGNING_KEYS=${escaped_keys}|" "$file"
            else
              echo "STEM_SIGNING_KEYS=${keys_value}" >> "$file"
            fi

            active="primary"
            if [[ "$file" == *".env.rotate" ]]; then
              active="rotated"
            fi
            if grep -q "^STEM_SIGNING_ACTIVE_KEY=" "$file"; then
              sed -i -E "s|^STEM_SIGNING_ACTIVE_KEY=.*|STEM_SIGNING_ACTIVE_KEY=${active}|" "$file"
            else
              echo "STEM_SIGNING_ACTIVE_KEY=${active}" >> "$file"
            fi
          done

          echo "Rotated signing keys in .env, .env.primary, and .env.rotate"
        '

  deps-up:
    desc: Start Redis dependency.
    cmds:
      - docker compose -f "{{.TASKFILE_DIR}}/docker-compose.yml" up -d redis

  deps-down:
    desc: Stop docker-compose services.
    cmds:
      - docker compose -f "{{.TASKFILE_DIR}}/docker-compose.yml" down

  compose-up:
    desc: Start Redis for the rotation drill.
    cmds:
      - task: deps-up

  compose-down:
    desc: Stop Redis for the rotation drill.
    cmds:
      - task: deps-down

  build:worker:
    desc: Compile worker binary.
    cmds:
      - |
        bash -lc '
          set -euo pipefail
          cd "{{.TASKFILE_DIR}}"
          dart pub get
          dart build cli -t bin/worker.dart -o build/worker
        '

  build:producer:
    desc: Compile producer binary.
    cmds:
      - |
        bash -lc '
          set -euo pipefail
          cd "{{.TASKFILE_DIR}}"
          dart pub get
          dart build cli -t bin/producer.dart -o build/producer
        '

  build:
    desc: Compile worker and producer binaries.
    deps: [build:worker, build:producer]

  run:worker:
    desc: Run compiled worker using `.env` (verifies both keys).
    deps: [build:worker]
    cmds:
      - |
        bash -lc '
          set -euo pipefail
          root="{{.TASKFILE_DIR}}"
          env_file="${ENV_FILE:-.env}"
          if [[ -f "$env_file" ]]; then
            set -a
            source "$env_file"
            set +a
          elif [[ -f "$root/$env_file" ]]; then
            set -a
            source "$root/$env_file"
            set +a
          fi
          export REDIS_PORT="${REDIS_PORT:-6379}"
          export STEM_BROKER_URL="${STEM_BROKER_URL:-redis://localhost:${REDIS_PORT}/0}"
          export STEM_RESULT_BACKEND_URL="${STEM_RESULT_BACKEND_URL:-redis://localhost:${REDIS_PORT}/1}"
          "$root/build/worker/bundle/bin/"*
        '

  run:producer:
    desc: Run compiled producer (ENV_FILE controls active key profile).
    deps: [build:producer]
    cmds:
      - |
        bash -lc '
          set -euo pipefail
          root="{{.TASKFILE_DIR}}"
          env_file="${ENV_FILE:-.env.primary}"
          if [[ -f "$env_file" ]]; then
            set -a
            source "$env_file"
            set +a
          elif [[ -f "$root/$env_file" ]]; then
            set -a
            source "$root/$env_file"
            set +a
          fi
          export REDIS_PORT="${REDIS_PORT:-6379}"
          export STEM_BROKER_URL="${STEM_BROKER_URL:-redis://localhost:${REDIS_PORT}/0}"
          export STEM_RESULT_BACKEND_URL="${STEM_RESULT_BACKEND_URL:-redis://localhost:${REDIS_PORT}/1}"
          "$root/build/producer/bundle/bin/"*
        '

  run:producer-primary:
    desc: Run producer with `.env.primary`.
    cmds:
      - ENV_FILE=.env.primary task -t "{{.TASKFILE_DIR}}/Taskfile.yml" run:producer

  run:producer-rotated:
    desc: Run producer with `.env.rotate`.
    cmds:
      - ENV_FILE=.env.rotate task -t "{{.TASKFILE_DIR}}/Taskfile.yml" run:producer

  clean:
    desc: Remove compiled artifacts.
    cmds:
      - rm -rf "{{.TASKFILE_DIR}}/build"
